<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion CV - Reset Password</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .container {
            max-width: 450px;
            min-height: auto;
            padding: 50px 40px;
            flex-direction: column;
        }

        .reset-form {
            width: 100%;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success i {
            color: #10b981;
        }

        .toast.error i {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <div class="reset-form">
            <div class="logo">
                <i class="ri-pages-line"></i> Fusion CV
            </div>
            <h2>New Password</h2>
            <p class="subtitle">Secure your account with a strong password</p>

            <form id="resetPasswordForm">
                <div class="infield">
                    <i class="ri-lock-line"></i>
                    <input type="password" id="newPassword" placeholder="New Password" required minlength="6" />
                </div>
                <div class="infield">
                    <i class="ri-lock-password-line"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6" />
                </div>
                <button type="submit" class="btn" id="updateBtn">Update Password <i
                        class="ri-checkbox-circle-line"></i></button>
            </form>
            <p style="margin-top: 25px; text-align: center; font-size: 14px; color: #71717a;">
                <a href="index.html" style="color: #818cf8; text-decoration: none;">Back to Login</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        const resetForm = document.getElementById('resetPasswordForm');
        const updateBtn = document.getElementById('updateBtn');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            updateBtn.disabled = true;
            updateBtn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Updating...';

            const { error } = await supabaseClient.auth.updateUser({ password });

            if (error) {
                showToast(error.message, 'error');
                updateBtn.disabled = false;
                updateBtn.innerHTML = 'Update Password <i class="ri-checkbox-circle-line"></i>';
            } else {
                showToast('Password updated successfully!', 'success');
                setTimeout(() => {
                    window.location.replace('index.html');
                }, 2000);
            }
        });

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'success' ? 'ri-checkbox-circle-line' : 'ri-error-warning-line';
            toast.innerHTML = `<i class="${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>

</html>
