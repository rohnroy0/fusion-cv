<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion CV - Admin Login</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .login-card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .login-card h2 {
            margin-bottom: 30px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
        .toast {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .toast.show { transform: translateX(0); }
        .toast i { font-size: 20px; }
        .toast.success i { color: #10b981; }
        .toast.error i { color: #ef4444; }
        .toast.info i { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
        <div class="logo" style="justify-content: center; margin-bottom: 20px;">
            <i class="ri-shield-keyhole-line"></i> Admin Access
        </div>
        <h2>Sign In</h2>
        <form id="adminLoginForm">
            <div class="infield">
                <i class="ri-mail-line"></i>
                <input type="email" id="adminEmail" placeholder="Admin Email" required />
            </div>
            <div class="infield">
                <i class="ri-lock-line"></i>
                <input type="password" id="adminPass" placeholder="Admin Password" required />
            </div>
            <button type="submit" class="btn" style="width: 100%;">Access Portal <i class="ri-arrow-right-line"></i></button>
        </form>
    </div>

    <!-- Same Toast System as index.html -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Include Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>

    <script>
        // Use your designated admin email here for local verification check
        const ADMIN_EMAIL = 'admin@fusioncv.com'; 

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const btn = e.target.querySelector('.btn');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Authenticating...';

            // Sign in using Supabase Auth
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: pass
            });

            if (error) {
                showSecurityAlert(email, 'Invalid Admin Login Credentials');
            } else {
                // Verify if the logged in user is actually the admin
                if (data.user.email === ADMIN_EMAIL) {
                    // Success Access Granted Design
                    document.body.innerHTML += `
                        <div id="successOverlay" style="position: fixed; inset: 0; background: rgba(9, 9, 11, 0.95); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 10000; animation: fadeIn 0.3s ease;">
                            <div style="background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(16, 185, 129, 0.3); padding: 40px; border-radius: 24px; text-align: center; max-width: 400px; box-shadow: 0 0 50px rgba(16, 185, 129, 0.2);">
                                <i class="ri-checkbox-circle-line" style="font-size: 64px; color: #10b981; display: block; margin-bottom: 20px;"></i>
                                <h1 style="color: #fff; font-family: 'Outfit', sans-serif; margin-bottom: 10px;">Access Granted</h1>
                                <p style="color: #a1a1aa; line-height: 1.6; margin-bottom: 25px;">Welcome back, Admin. Preparing your dashboard...</p>
                                <div style="width: 40px; height: 40px; border: 3px solid rgba(16, 185, 129, 0.3); border-top-color: #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;"></div>
                            </div>
                        </div>
                        <style>
                            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                            @keyframes spin { to { transform: rotate(360deg); } }
                        </style>
                    `;
                    setTimeout(() => {
                        location.href = 'admin.html';
                    }, 2000);
                } else {
                    showSecurityAlert(data.user.email, 'Invalid Admin Login Credentials');
                    await supabaseClient.auth.signOut();
                }
            }
        });

        function showSecurityAlert(email, message) {
            document.body.innerHTML += `
                <div id="accessDeniedOverlay" style="position: fixed; inset: 0; background: rgba(9, 9, 11, 0.95); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 10000; animation: fadeIn 0.3s ease;">
                    <div style="background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(239, 68, 68, 0.3); padding: 40px; border-radius: 24px; text-align: center; max-width: 400px; box-shadow: 0 0 50px rgba(239, 68, 68, 0.2);">
                        <i class="ri-shield-flash-line" style="font-size: 64px; color: #ef4444; display: block; margin-bottom: 20px;"></i>
                        <h1 style="color: #fff; font-family: 'Outfit', sans-serif; margin-bottom: 10px;">Security Alert</h1>
                        <p style="color: #a1a1aa; line-height: 1.6; margin-bottom: 25px;"><strong>${message}</strong></p>
                        <button onclick="location.reload()" class="btn" style="width: 100%; background: #ef4444; border: none; border-radius: 12px; padding: 14px; color: white; cursor: pointer; font-weight: 600;">Return to Login</button>
                    </div>
                </div>
                <style>@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }</style>
            `;
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'success' ? 'ri-checkbox-circle-line' : 'ri-error-warning-line';
            toast.innerHTML = `<i class="${icon}"></i><span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
