<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fusion CV - Admin Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body {
            display: block;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }
        .admin-header {
            max-width: 1000px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-title h1 {
            font-size: 28px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .admin-card {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            text-align: left;
            padding: 12px 15px;
            color: #a1a1aa;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            color: #e2e8f0;
        }
        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-active {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .loading-state {
            text-align: center;
            padding: 40px;
            color: #a1a1aa;
        }
        .loading-state i {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
        }
        
        /* Mobile Enhancements */
        @media (max-width: 768px) {
            .admin-header { flex-direction: column; gap: 15px; text-align: center; margin-bottom: 20px; }
            thead { display: none; }
            tr { display: block; margin-bottom: 15px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 10px; border: 1px solid rgba(255, 255, 255, 0.05); }
            td { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); text-align: right; }
            td:last-child { border-bottom: none; }
            td::before { content: attr(data-label); font-weight: 600; color: #a1a1aa; text-align: left; font-size: 12px; text-transform: uppercase; }
        }

        /* Portal Login Styles */
        #adminLoginView {
            position: fixed;
            inset: 0;
            background: #09090b;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <!-- Login View Overlay -->
    <div id="adminLoginView">
        <div class="background-elements" style="position: absolute; inset: 0; z-index: -1;">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>
        <div class="login-card">
            <div class="logo" style="justify-content: center; margin-bottom: 20px;">
                <i class="ri-shield-keyhole-line"></i> Admin Access
            </div>
            <h2 style="color:white; margin-bottom:30px;">Sign In</h2>
            <form id="adminLoginForm">
                <div class="infield">
                    <i class="ri-mail-line"></i>
                    <input type="email" id="adminEmail" placeholder="Admin Email" required />
                </div>
                <div class="infield">
                    <i class="ri-lock-line"></i>
                    <input type="password" id="adminPass" placeholder="Admin Password" required />
                </div>
                <button type="submit" class="btn" style="width: 100%;">Access Portal <i class="ri-arrow-right-line"></i></button>
            </form>
        </div>
    </div>

    <!-- Main Admin Content (Initially Hidden) -->
    <div id="adminMainContent" style="display: none; padding: 40px 20px;">
        <div class="admin-header">
            <div class="admin-title">
                <h1><i class="ri-shield-user-line"></i> Admin Portal</h1>
                <p style="color: #a1a1aa; font-size: 14px;">User Management Dashboard</p>
            </div>
            <button class="ghost" onclick="adminLogout()" style="padding: 10px 20px; font-size: 13px;">Logout</button>
        </div>
        <div class="admin-card">
            <div id="userList">
                <div class="loading-state">
                    <i class="ri-loader-4-line ri-spin"></i>
                    Fetching users...
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <style>
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 11000; }
        .toast { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 16px 24px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast.show { transform: translateX(0); }
        .toast i { font-size: 20px; }
        .toast.success i { color: #10b981; }
        .toast.error i { color: #ef4444; }
        .toast.info i { color: #3b82f6; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
        const ADMIN_EMAIL = 'admin@fusioncv.com';

        // Check for existing session on load
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && session.user.email === ADMIN_EMAIL) {
                showPortal();
            } else {
                document.getElementById('adminLoginView').style.display = 'flex';
            }
        };

        function showPortal() {
            document.getElementById('adminLoginView').style.display = 'none';
            document.getElementById('adminMainContent').style.display = 'block';
            fetchUsers();
        }

        async function adminLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const btn = e.target.querySelector('.btn');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Authenticating...';

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });

            if (error || data.user.email !== ADMIN_EMAIL) {
                if (!error) await supabaseClient.auth.signOut();
                showSecurityAlert(email, 'Invalid Admin Login Credentials');
                btn.disabled = false;
                btn.innerHTML = 'Access Portal <i class="ri-arrow-right-line"></i>';
            } else {
                showSuccessOverlay();
                setTimeout(() => showPortal(), 2000);
            }
        });

        async function fetchUsers() {
            const userListDiv = document.getElementById('userList');
            const { data, error } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending: false });
            if (error) {
                userListDiv.innerHTML = `<p style="color:#ef4444;text-align:center;">Error: ${error.message}</p>`;
                return;
            }
            let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Status</th></tr></thead><tbody>';
            data.forEach(user => {
                html += `<tr><td data-label="Name"><strong>${user.full_name || 'Anonymous'}</strong></td><td data-label="Email">${user.email}</td><td data-label="Joined">${new Date(user.created_at).toLocaleDateString()}</td><td data-label="Status"><span class="status-badge status-active">Active</span></td></tr>`;
            });
            userListDiv.innerHTML = html + '</tbody></table>';
        }

        function showSecurityAlert(email, message) {
            document.body.insertAdjacentHTML('beforeend', `
                <div id="accessDeniedOverlay" style="position: fixed; inset: 0; background: rgba(9, 9, 11, 0.95); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 20000; animation: fadeIn 0.3s ease;">
                    <div style="background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(239, 68, 68, 0.3); padding: 40px; border-radius: 24px; text-align: center; max-width: 400px; box-shadow: 0 0 50px rgba(239, 68, 68, 0.2);">
                        <i class="ri-shield-flash-line" style="font-size: 64px; color: #ef4444; display: block; margin-bottom: 20px;"></i>
                        <h1 style="color: #fff; font-family: 'Outfit', sans-serif; margin-bottom: 10px;">Security Alert</h1>
                        <p style="color: #a1a1aa; line-height: 1.6; margin-bottom: 25px;"><strong>${message}</strong></p>
                        <button onclick="location.reload()" class="btn" style="width: 100%; background: #ef4444; border: none; border-radius: 12px; padding: 14px; color: white; cursor: pointer; font-weight: 600;">Return to Login</button>
                    </div>
                </div>
                <style>@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }</style>
            `);
        }

        function showSuccessOverlay() {
            document.body.insertAdjacentHTML('beforeend', `
                <div id="successOverlay" style="position: fixed; inset: 0; background: rgba(9, 9, 11, 0.95); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 20000; animation: fadeIn 0.3s ease;">
                    <div style="background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(16, 185, 129, 0.3); padding: 40px; border-radius: 24px; text-align: center; max-width: 400px; box-shadow: 0 0 50px rgba(16, 185, 129, 0.2);">
                        <i class="ri-checkbox-circle-line" style="font-size: 64px; color: #10b981; display: block; margin-bottom: 20px;"></i>
                        <h1 style="color: #fff; font-family: 'Outfit', sans-serif; margin-bottom: 10px;">Access Granted</h1>
                        <p style="color: #a1a1aa; line-height: 1.6; margin-bottom: 25px;">Welcome back, Admin.</p>
                        <div style="width: 40px; height: 40px; border: 3px solid rgba(16, 185, 129, 0.3); border-top-color: #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;"></div>
                    </div>
                </div>
                <style>
                    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                    @keyframes spin { to { transform: rotate(360deg); } }
                </style>
            `);
        }
    </script>
</body>
</html>
